<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Diagnóstico T.P.G. — Afluente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#0A0E14;
    --deep:#0D2240;
    --current:#1A3A5C;
    --river:#2A5A8C;
    --silver:#B8C5D4;
    --mist:#F0F2F5;
    --ice:#FFFFFF;
    --glow:#4A8AC4;
    --steel:#3A4A5C;
    --slate:#6B7B8D;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--abyss);
    color:var(--mist);
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    width:100%;
    max-width:520px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  /* Wave decoration */
  .waves{
    position:absolute;
    top:0; left:0; right:0;
    height:120px;
    overflow:hidden;
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .waves svg{width:100%;height:100%;}

  header{
    padding:28px 24px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    position:relative;
    z-index:1;
  }
  header .logo-text{
    font-family:'Outfit',sans-serif;
    font-weight:300;
    font-size:22px;
    letter-spacing:0.25em;
    color:var(--mist);
  }
  header .logo-sub{
    font-family:'Space Mono',monospace;
    font-size:9px;
    letter-spacing:0.2em;
    color:var(--slate);
    display:block;
    margin-top:2px;
  }

  main{
    flex:1;
    padding:8px 24px 100px;
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:1;
  }

  /* progress bar */
  .progress-wrap{
    width:100%;
    height:3px;
    background:var(--current);
    border-radius:2px;
    overflow:hidden;
    margin-bottom:28px;
  }
  .progress-bar{
    height:100%;
    background:var(--glow);
    transition:width .4s ease;
    width:0%;
  }

  /* cover */
  .cover{
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .cover-photo{
    width:100%;
    aspect-ratio:1/1;
    max-height:280px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid var(--current);
    box-shadow:0 20px 60px rgba(74,138,196,0.15);
  }
  h1{
    font-family:'Outfit',sans-serif;
    font-weight:300;
    font-size:28px;
    line-height:1.3;
    color:var(--ice);
  }
  h1 .accent{color:var(--glow);}
  .subhead{
    font-size:15px;
    color:var(--silver);
    line-height:1.6;
  }
  .bullets{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin:8px 0;
  }
  .bullet{
    font-size:14px;
    color:var(--silver);
    padding-left:18px;
    position:relative;
    line-height:1.5;
  }
  .bullet::before{
    content:'';
    position:absolute;
    left:0; top:8px;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--glow);
  }
  .support-text{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--slate);
    line-height:1.7;
    border-top:1px solid var(--current);
    padding-top:16px;
    margin-top:8px;
  }

  /* question */
  .q-eyebrow{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--glow);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .q-context{
    font-size:14px;
    color:var(--silver);
    line-height:1.7;
    margin-bottom:18px;
  }
  .q-title{
    font-family:'Outfit',sans-serif;
    font-weight:400;
    font-size:21px;
    color:var(--ice);
    line-height:1.4;
    margin-bottom:24px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .option{
    background:var(--deep);
    border:1px solid var(--current);
    border-radius:12px;
    padding:16px 18px;
    color:var(--mist);
    font-size:14.5px;
    line-height:1.5;
    text-align:left;
    cursor:pointer;
    transition:all .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .option:active, .option:hover{
    border-color:var(--glow);
    background:var(--current);
    transform:translateY(-1px);
  }

  /* feedback overlay */
  .feedback{
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:520px;
    background:var(--river);
    color:var(--ice);
    padding:18px 24px;
    font-size:13.5px;
    line-height:1.6;
    border-top:1px solid var(--glow);
    animation:slideUp .35s ease;
    z-index:10;
  }
  @keyframes slideUp{
    from{transform:translate(-50%,100%);}
    to{transform:translate(-50%,0);}
  }

  /* capture form */
  .form-group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }
  label{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.1em;
    color:var(--slate);
    text-transform:uppercase;
  }
  input{
    background:var(--deep);
    border:1px solid var(--current);
    border-radius:10px;
    padding:14px 16px;
    color:var(--ice);
    font-size:15px;
    font-family:'DM Sans',sans-serif;
    outline:none;
    transition:border-color .2s;
  }
  input:focus{border-color:var(--glow);}
  input::placeholder{color:var(--slate);}

  /* buttons */
  .btn{
    margin-top:8px;
    background:linear-gradient(135deg, #5B9BD9 0%, #2A5A8C 100%);
    color:var(--ice);
    border:none;
    border-radius:50px;
    padding:18px 28px;
    font-family:'DM Sans',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.01em;
    cursor:pointer;
    text-align:center;
    transition:all .2s;
    text-decoration:none;
    display:block;
    box-shadow:0 8px 24px rgba(74,138,196,0.35);
  }
  .btn:active{transform:scale(0.98);}
  .btn-secondary{
    background:linear-gradient(135deg, #5B9BD9 0%, #2A5A8C 100%);
    color:var(--ice);
  }

  /* result screens */
  .result-tag{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--glow);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .result-title{
    font-family:'Outfit',sans-serif;
    font-weight:300;
    font-size:24px;
    color:var(--ice);
    line-height:1.35;
    margin-bottom:16px;
  }
  .result-body p{
    font-size:14.5px;
    color:var(--silver);
    line-height:1.75;
    margin-bottom:14px;
  }
  .result-list{
    background:var(--deep);
    border:1px solid var(--current);
    border-radius:12px;
    padding:18px 20px;
    margin:18px 0;
  }
  .result-list-title{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:0.1em;
    color:var(--glow);
    text-transform:uppercase;
    margin-bottom:12px;
  }
  .result-list ul{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .result-list li{
    font-size:13.5px;
    color:var(--silver);
    line-height:1.5;
    padding-left:16px;
    position:relative;
  }
  .result-list li::before{
    content:'';
    position:absolute;
    left:0; top:7px;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--glow);
  }
  .signature{
    margin-top:28px;
    padding-top:18px;
    border-top:1px solid var(--current);
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--slate);
  }

  /* loading */
  .loading-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
  }
  .spinner{
    width:36px;height:36px;
    border:2px solid var(--current);
    border-top-color:var(--glow);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen p{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--slate);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }
</style>
</head>

<div id="app">
  <div class="waves">
    <svg viewBox="0 0 500 120" preserveAspectRatio="none">
      <path d="M0,40 Q125,10 250,40 T500,40" fill="none" stroke="#1A3A5C" stroke-width="2"/>
      <path d="M0,65 Q125,35 250,65 T500,65" fill="none" stroke="#2A5A8C" stroke-width="2"/>

  </div>
  <header>
    <div>
      <span class="logo-text">AFLUENTE</span>
      <span class="logo-sub">MENTORIA COMERCIAL</span>
    </div>
  </header>
  <main id="main"></main>
</div>

let state = {
  screen: 'cover',
  trilha: null, // 1 ou 2
  answers: {},

const QUESTIONS_T1 = [
  {
    id:'p1_1', key:'ticket',
    eyebrow:'Pilar 1 de 5',
    context:"A estrutura comercial que funciona pra negócios digitais de alto valor tem regras próprias. Contratar, treinar e gerir um time só faz sentido quando cada venda gera receita suficiente pra justificar a operação. Abaixo de um certo patamar, o custo de manter o time come o lucro.",
    title:"Qual o ticket médio do seu produto mais caro ativo no momento?",
    options:[
      {label:"Abaixo de R$ 1.500", value:"baixo", feedback:"Nessa faixa, um comercial estruturado custa mais do que retorna."},
      {label:"Entre R$ 1.500 e R$ 3.000", value:"limitrofe", feedback:"Dá pra fazer funcionar, mas a margem é apertada. Vamos ver o resto."},

  {
    id:'p1_2', key:'leads',

    title:"Quantos leads novos o seu marketing gera por mês, em média?",
    options:[
      {label:"Menos de 50", value:"baixo", feedback:"Volume baixo pra sustentar um time. O primeiro passo pode ser marketing, não comercial."},
      {label:"Entre 50 e 100", value:"minimo", feedback:"Dá pra começar, mas sem margem de erro. Cada lead precisa ser muito bem trabalhado."},
      {label:"Mais de 100", value:"saudavel", feedback:"Volume que sustenta operação. A questão é: quantos desses estão sendo desperdiçados?"}
    ]
  },
  {
    id:'p1_3', key:'custo_ausencia',
    eyebrow:'Pilar 3 de 5',
    context:"Quando o dono é o único que vende, o negócio tem um teto invisível: o tempo e a energia de uma pessoa. Tudo funciona, até que você precise parar. E quando você para, o negócio descobre que não tem um comercial, tem você.",
    title:"Se você parasse de vender pessoalmente (seja diretamente, seja por lançamento) por 30 a 60 dias, o que aconteceria com a receita?",

    title:"O que mais te impede de ter alguém vendendo por você hoje?",
    options:[

      {label:"Já tentei, contratei e não funcionou", value:"tentou", feedback:"Vendedor sem processo, treinamento e gestão é como piloto sem instrumento. A pessoa não é o problema."},
      {label:"Tenho receio de perder qualidade na venda", value:"receio", feedback:"Legítimo. Mas enquanto só você vende com qualidade, o negócio tem teto. Qualidade se replica com método."},

      {label:"Nada disso", value:"nada", feedback:"Começar do zero parece assustador, mas é mais limpo que remendar. A construção é o caminho."},

const QUESTIONS_T2 = [

/* ============================================================
   HELPERS
   ============================================================ */
function fbqTrack(event, params){
  if(window.fbq) fbq('track', event, params || {});
}

function render(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  if(state.screen === 'cover') renderCover(main);
  else if(state.screen === 'p0') renderP0(main);
  else if(state.screen === 'question') renderQuestion(main);
  else if(state.screen === 'capture') renderCapture(main);
  else if(state.screen === 'loading') renderLoading(main);
  else if(state.screen === 'result') renderResult(main);
  window.scrollTo(0,0);
}

function renderProgress(pct){
  const wrap = document.createElement('div');
  wrap.className = 'progress-wrap';
  const bar = document.createElement('div');
  bar.className = 'progress-bar';
  bar.style.width = pct+'%';
  wrap.appendChild(bar);
  return wrap;
}

/* ============================================================

/* ============================================================
   FEEDBACK OVERLAY
   ============================================================ */
function showFeedback(text, onNext){
  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.innerHTML = `<p>${text}</p><button class="btn" id="fb-next" style="margin-top:14px;">Continuar →</button>`;
  document.getElementById('app').appendChild(fb);
  document.getElementById('fb-next').onclick = ()=>{
    fb.remove();
    onNext();
  };
}

/* ============================================================
   QUESTIONS (Trilha 1 ou 2)
   ============================================================ */
function renderQuestion(main){
  const list = state.trilha === 1 ? QUESTIONS_T1 : QUESTIONS_T2;
  const q = list[state.qIndex];
  const totalSteps = list.length + 1; // +1 para P0
  const pct = Math.round(((state.qIndex+1)/totalSteps)*100 + (8 - 8/totalSteps));

  main.appendChild(renderProgress(Math.min(pct, 95)));

  const div = document.createElement('div');
  div.innerHTML = `
    <div class="q-eyebrow">${q.eyebrow}</div>
    <div class="q-context">${q.context}</div>
    <div class="q-title">${q.title}</div>
    <div class="options" id="opts"></div>
  `;
  main.appendChild(div);

  const optsContainer = document.getElementById('opts');
  q.options.forEach(o=>{
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = o.label;
    btn.onclick = ()=>{
      state.answers[q.key] = o.value;
      if(o.tag && o.peso){
        state.tags[o.tag] = (state.tags[o.tag]||0) + o.peso;
      }
      showFeedback(o.feedback, ()=>{
        if(state.qIndex < list.length - 1){
          state.qIndex++;
          render();
        } else {
          computeResult();
          state.screen = 'capture';
          render();
        }
      });
    };
    optsContainer.appendChild(btn);
  });
}

/* ============================================================
   ROUTING LOGIC
   ============================================================ */
function computeResult(){
  if(state.trilha === 1){
    const ticket = state.answers.ticket;
    const leads = state.answers.leads;
    const ticketBaixo = (ticket === 'baixo');
    const leadsBaixo = (leads === 'baixo');

    if(ticketBaixo || leadsBaixo){
      // Diagnóstico 1
      state.resultado = 'd1';
    } else {
      state.resultado = 'd2';
    }
  } else {
    // Trilha 2
    const tags = state.tags;
    const auto = state.answers.autodiagnostico;

    if(auto === 'maduro' &&
       state.answers.tecnica_script === 'ok' &&
       state.answers.processo_conversao === 'ok' &&
       state.answers.processo_followup === 'ok' &&
       state.answers.gestao_rotina === 'ok' &&
       state.answers.gestao_cac === 'ok'){
      state.resultado = 'd5';
      return;
    }

    if(auto === 'aberto'){
      state.resultado = 'd4';
      return;
    }

    // Regra de ouro: maior tag vence; empate ou tecnica menor -> d4
    const max = Math.max(tags.tecnica, tags.processo, tags.gestao);
    if(tags.tecnica === max && tags.tecnica > tags.processo && tags.tecnica > tags.gestao){
      state.resultado = 'd3';
    } else {
      state.resultado = 'd4';
    }
  }
}

/* ============================================================
   SUBMIT TO GOOGLE SHEETS
   ============================================================ */
function submitToSheet(){
  const payload = {
    timestamp: new Date().toISOString(),
    nome: state.lead.nome,
    email: state.lead.email,
    whatsapp: state.lead.whatsapp,
    instagram: state.lead.instagram,
    trilha: state.trilha,
    resultado: state.resultado,
    tags: JSON.stringify(state.tags),
    respostas: JSON.stringify(state.answers)
  };

  if(GOOGLE_SHEET_URL && GOOGLE_SHEET_URL !== "https://script.google.com/macros/s/AKfycbxjq0flsNYse_Yp5byR_Cj7jYJXhn2b-gP3FOYMY8ASluDtIYjw4K4j0AWza721u073-g/exec"){
    fetch(GOOGLE_SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    }).catch(()=>{}).finally(()=>{
      setTimeout(()=>{ state.screen='result'; render(); }, 900);
    });
  } else {
    setTimeout(()=>{ state.screen='result'; render(); }, 900);
  }
}
